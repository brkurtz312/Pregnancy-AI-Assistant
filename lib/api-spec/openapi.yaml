openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI assistant operations
  - name: billing
    description: Pass purchase and entitlement operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai/ask:
    post:
      operationId: askAssistant
      tags: [ai]
      summary: Ask the pregnancy assistant
      description: >
        Ask an evidence-based pregnancy and infant-health question. Answers are
        guided to align with ACOG and AAP guidance and always include a
        disclaimer to consult a healthcare provider.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantQuery"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantReply"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Free question limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests; rate limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: The AI provider failed to respond
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The AI integration is not provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /ai/weekly-insight:
    post:
      operationId: getWeeklyInsight
      tags: [ai]
      summary: Weekly pregnancy insight
      description: >
        Returns an evidence-based insight for a given gestational week, guided to
        align with ACOG and AAP guidance, with a disclaimer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeeklyInsightQuery"
      responses:
        "200":
          description: Weekly insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyInsight"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests; rate limit exceeded
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: The AI provider failed to respond
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: The AI integration is not provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /billing/pass-status:
    get:
      operationId: getPassStatus
      tags: [billing]
      summary: Pass entitlement and free usage
      description: >
        Returns whether the signed-in user owns the Full Pregnancy Pass and
        their weekly free question usage.
      responses:
        "200":
          description: Pass status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassStatus"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /billing/checkout:
    post:
      operationId: createCheckout
      tags: [billing]
      summary: Start a checkout session for the pass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Payments unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /billing/confirm:
    post:
      operationId: confirmCheckout
      tags: [billing]
      summary: Confirm a completed checkout and refresh entitlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmRequest"
      responses:
        "200":
          description: Updated pass status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassStatus"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /billing/redeem-code:
    post:
      operationId: redeemCode
      tags: [billing]
      summary: Redeem a developer access code to unlock the pass
      description: >
        Grants the Full Pregnancy Pass to the signed-in user when the provided
        code matches the server-configured developer access code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemCodeRequest"
      responses:
        "200":
          description: Updated pass status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassStatus"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Invalid access code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Code redemption is not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
      required:
        - error
    PassStatus:
      type: object
      properties:
        hasPass:
          type: boolean
        freeUsed:
          type: integer
        freeLimit:
          type: integer
      required:
        - hasPass
        - freeUsed
        - freeLimit
    CheckoutRequest:
      type: object
      properties:
        returnUrl:
          type: string
          minLength: 1
      required:
        - returnUrl
    CheckoutSession:
      type: object
      properties:
        url:
          type: string
      required:
        - url
    ConfirmRequest:
      type: object
      properties:
        sessionId:
          type: ["string", "null"]
    RedeemCodeRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 1
      required:
        - code
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          minLength: 1
      required:
        - role
        - content
    AssistantQuery:
      type: object
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000
        week:
          type: ["integer", "null"]
          minimum: 1
          maximum: 42
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - question
    AssistantReply:
      type: object
      properties:
        answer:
          type: string
        disclaimer:
          type: string
      required:
        - answer
        - disclaimer
    WeeklyInsightQuery:
      type: object
      properties:
        week:
          type: integer
          minimum: 1
          maximum: 42
      required:
        - week
    WeeklyInsight:
      type: object
      properties:
        week:
          type: integer
        insight:
          type: string
        disclaimer:
          type: string
      required:
        - week
        - insight
        - disclaimer
