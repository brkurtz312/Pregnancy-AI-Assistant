kind = "mobile"
previewPath = "/mobile/"
title = "Pregnancy Calculator Mobile"
version = "1.0.0"
id = "artifacts/pregnancy-calculator-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21176

[services.development]
run = "pnpm --filter @workspace/pregnancy-calculator-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pregnancy-calculator-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pregnancy-calculator-mobile", "run", "serve" ]

[services.env]
PORT = "21176"
BASE_PATH = "/mobile/"
