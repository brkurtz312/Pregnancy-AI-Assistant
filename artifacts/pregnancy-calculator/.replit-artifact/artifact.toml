kind = "web"
previewPath = "/"
title = "Pregnancy Calculator"
version = "1.0.0"
id = "artifacts/pregnancy-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24483

[services.development]
run = "pnpm --filter @workspace/pregnancy-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pregnancy-calculator", "run", "build" ]
publicDir = "artifacts/pregnancy-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24483"
BASE_PATH = "/"
